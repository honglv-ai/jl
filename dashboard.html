<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简历构建器 - Resume Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Noto Serif SC', serif; }
    .container { max-width: 1200px; margin: 0 auto; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-in { animation: slideIn 0.5s ease-out; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">

  <!-- Navigation -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container px-6 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-slate-800">📄 简历构建器</h1>
      <div class="flex gap-4">
        <button id="logoutBtn" class="px-4 py-2 text-slate-600 hover:text-slate-800">登出</button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container px-6 py-8">

    <!-- Auth Section -->
    <div id="authSection" class="hidden">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
        
        <!-- Login -->
        <div class="bg-white rounded-lg shadow-lg p-8 slide-in">
          <h2 class="text-2xl font-bold text-slate-800 mb-6">登录</h2>
          <form id="loginForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">邮箱</label>
              <input type="email" id="loginEmail" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">密码</label>
              <input type="password" id="loginPassword" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
            </div>
            <button type="submit" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-slate-700 transition">登录</button>
          </form>
        </div>

        <!-- Register -->
        <div class="bg-white rounded-lg shadow-lg p-8 slide-in" style="animation-delay: 0.1s">
          <h2 class="text-2xl font-bold text-slate-800 mb-6">注册</h2>
          <form id="registerForm" class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">姓名</label>
              <input type="text" id="registerName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">邮箱</label>
              <input type="email" id="registerEmail" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-2">密码</label>
              <input type="password" id="registerPassword" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
            </div>
            <button type="submit" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-slate-700 transition">注册</button>
          </form>
        </div>

      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="hidden">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-slate-800 mb-2">欢迎，<span id="userNameDisplay"></span>!</h2>
        <p class="text-slate-600">你的二级域名: <span id="domainDisplay" class="font-mono bg-slate-100 px-3 py-1 rounded"></span></p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Resume Editor -->
        <div class="lg:col-span-2 bg-white rounded-lg shadow-lg p-8">
          <h3 class="text-2xl font-bold text-slate-800 mb-6">编辑简历</h3>
          
          <form id="resumeForm" class="space-y-6">
            
            <!-- Personal Info -->
            <fieldset class="border border-slate-200 rounded-lg p-6">
              <legend class="text-lg font-semibold text-slate-800 px-3 -mt-3 bg-white">个人信息</legend>
              
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-2">姓名</label>
                  <input type="text" id="resumeName" placeholder="你的名字" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-2">出生日期</label>
                  <input type="date" id="resumeBirthDate" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-2">邮箱</label>
                  <input type="email" id="resumeEmail" placeholder="你的邮箱" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-2">电话</label>
                  <input type="tel" id="resumePhone" placeholder="你的电话" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
                </div>
              </div>

              <div class="mt-4">
                <label class="block text-sm font-medium text-slate-700 mb-2">个人简介</label>
                <textarea id="resumeBio" placeholder="介绍你自己..." rows="4" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500"></textarea>
              </div>
            </fieldset>

            <!-- Experience -->
            <fieldset class="border border-slate-200 rounded-lg p-6">
              <legend class="text-lg font-semibold text-slate-800 px-3 -mt-3 bg-white">职业经历</legend>
              <div id="experienceContainer" class="space-y-4"></div>
              <button type="button" id="addExperienceBtn" class="mt-4 px-4 py-2 bg-slate-200 text-slate-800 rounded-lg hover:bg-slate-300 transition">+ 添加经历</button>
            </fieldset>

            <!-- Education -->
            <fieldset class="border border-slate-200 rounded-lg p-6">
              <legend class="text-lg font-semibold text-slate-800 px-3 -mt-3 bg-white">教育背景</legend>
              <div id="educationContainer" class="space-y-4"></div>
              <button type="button" id="addEducationBtn" class="mt-4 px-4 py-2 bg-slate-200 text-slate-800 rounded-lg hover:bg-slate-300 transition">+ 添加教育</button>
            </fieldset>

            <!-- Skills -->
            <fieldset class="border border-slate-200 rounded-lg p-6">
              <legend class="text-lg font-semibold text-slate-800 px-3 -mt-3 bg-white">核心能力</legend>
              <div class="flex flex-wrap gap-2 mb-4" id="skillsContainer"></div>
              <div class="flex gap-2">
                <input type="text" id="skillInput" placeholder="输入技能（回车添加）" class="flex-1 px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-500" />
                <button type="button" id="addSkillBtn" class="px-4 py-2 bg-slate-200 text-slate-800 rounded-lg hover:bg-slate-300 transition">添加</button>
              </div>
            </fieldset>

            <div class="flex gap-4">
              <button type="submit" class="flex-1 bg-slate-800 text-white py-3 rounded-lg hover:bg-slate-700 transition font-medium">✓ 生成/更新简历</button>
              <button type="button" id="previewBtn" class="flex-1 bg-slate-400 text-white py-3 rounded-lg hover:bg-slate-500 transition font-medium">👁️ 预览</button>
            </div>
          </form>
        </div>

        <!-- Sidebar Info -->
        <div class="space-y-6">
          
          <!-- Resume List -->
          <div class="bg-white rounded-lg shadow-lg p-6">
            <h4 class="text-lg font-semibold text-slate-800 mb-4">我的简历</h4>
            <div id="resumeList" class="space-y-2">
              <p class="text-slate-600 text-sm">还没有简历</p>
            </div>
          </div>

          <!-- Zodiac Info -->
          <div class="bg-gradient-to-br from-slate-100 to-slate-200 rounded-lg p-6 border-2 border-slate-300">
            <h4 class="text-lg font-semibold text-slate-800 mb-4">✨ 星座信息</h4>
            <div id="zodiacInfo" class="text-slate-700">
              <p class="text-sm">选择出生日期后显示星座信息</p>
            </div>
          </div>

          <!-- Share -->
          <div class="bg-blue-50 rounded-lg p-6 border-2 border-blue-200">
            <h4 class="text-lg font-semibold text-blue-900 mb-3">🔗 分享你的简历</h4>
            <textarea id="shareLink" readonly class="w-full px-3 py-2 bg-white border border-blue-300 rounded text-sm font-mono text-blue-900" rows="3"></textarea>
            <button id="copyShareLinkBtn" class="mt-3 w-full px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition">复制分享链接</button>
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- Modal for Preview -->
  <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white rounded-lg max-w-4xl w-full max-h-[90vh] overflow-auto relative">
      <button id="closePreviewBtn" class="sticky top-0 right-0 p-4 bg-white text-slate-600 hover:text-slate-800">✕</button>
      <div id="previewContent" class="p-6"></div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let token = localStorage.getItem('token');
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');
    let skills = [];

    // Show/Hide sections
    function showAuthSection() {
      document.getElementById('authSection').classList.remove('hidden');
      document.getElementById('dashboardSection').classList.add('hidden');
    }

    function showDashboard() {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('dashboardSection').classList.remove('hidden');
      document.getElementById('userNameDisplay').textContent = currentUser.name;
      document.getElementById('domainDisplay').textContent = `${currentUser.subdomain}.resumeBuilder.com`;
      loadResumes();
    }

    // Auth
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value
          })
        });
        const data = await res.json();
        if (data.success) {
          token = data.token;
          currentUser = data.user;
          localStorage.setItem('token', token);
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          showDashboard();
        } else {
          alert(data.error || '登录失败');
        }
      } catch (error) {
        alert('登录出错: ' + error.message);
      }
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('registerName').value,
            email: document.getElementById('registerEmail').value,
            password: document.getElementById('registerPassword').value
          })
        });
        const data = await res.json();
        if (data.success) {
          token = data.token;
          currentUser = data.user;
          localStorage.setItem('token', token);
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          alert(data.message + '\n\n你现在可以编辑你的简历了！');
          showDashboard();
        } else {
          alert(data.error || '注册失败');
        }
      } catch (error) {
        alert('注册出错: ' + error.message);
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('currentUser');
      token = null;
      currentUser = {};
      skills = [];
      showAuthSection();
    });

    // Resume Form
    document.getElementById('resumeName').addEventListener('change', (e) => {
      document.getElementById('resumeName').value = e.target.value;
    });

    document.getElementById('resumeBirthDate').addEventListener('change', async (e) => {
      const date = e.target.value;
      try {
        const res = await fetch(`${API_BASE}/zodiac/${date}`);
        const data = await res.json();
        if (data.success) {
          document.getElementById('zodiacInfo').innerHTML = `
            <div class="text-center">
              <div class="text-4xl mb-2">${data.zodiac.symbol}</div>
              <p class="text-xl font-semibold">${data.zodiac.name}</p>
              <p class="text-sm mt-2">${data.zodiac.traits.join(' · ')}</p>
            </div>
          `;
        }
      } catch (error) {
        console.error('获取星座信息失败:', error);
      }
    });

    // Skills management
    document.getElementById('addSkillBtn').addEventListener('click', () => {
      const input = document.getElementById('skillInput');
      if (input.value.trim()) {
        skills.push(input.value.trim());
        renderSkills();
        input.value = '';
      }
    });

    document.getElementById('skillInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('addSkillBtn').click();
      }
    });

    function renderSkills() {
      const container = document.getElementById('skillsContainer');
      container.innerHTML = skills.map((skill, idx) => `
        <span class="px-3 py-1 bg-slate-200 text-slate-800 rounded-full text-sm flex items-center gap-2">
          ${skill}
          <button type="button" onclick="removeSkill(${idx})" class="hover:text-red-600">✕</button>
        </span>
      `).join('');
    }

    window.removeSkill = (idx) => {
      skills.splice(idx, 1);
      renderSkills();
    };

    // Submit resume
    document.getElementById('resumeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(`${API_BASE}/resume/generate`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            name: document.getElementById('resumeName').value,
            birthDate: document.getElementById('resumeBirthDate').value,
            email: document.getElementById('resumeEmail').value,
            phone: document.getElementById('resumePhone').value,
            bio: document.getElementById('resumeBio').value,
            experience: [],
            education: [],
            skills: skills
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('✓ 简历已更新！');
          document.getElementById('shareLink').value = `${window.location.origin}/preview/${data.resume.id}`;
          loadResumes();
        } else {
          alert(data.error || '生成失败');
        }
      } catch (error) {
        alert('生成出错: ' + error.message);
      }
    });

    // Preview
    document.getElementById('previewBtn').addEventListener('click', async () => {
      const resumeName = document.getElementById('resumeName').value;
      if (!resumeName) {
        alert('请先输入姓名');
        return;
      }
      // 创建简历HTML预览
      const previewContent = `
        <div class="p-8">
          <h1 class="text-4xl font-bold mb-2">${resumeName}</h1>
          <p class="text-slate-600 mb-6">${document.getElementById('resumeEmail').value}</p>
          <h2 class="text-2xl font-bold mb-3 mt-6">个人简介</h2>
          <p class="text-slate-700 mb-6">${document.getElementById('resumeBio').value || '('暂无）'}</p>
          <h2 class="text-2xl font-bold mb-3 mt-6">核心能力</h2>
          <div class="flex flex-wrap gap-2">
            ${skills.map(s => `<span class="px-3 py-1 bg-slate-200 text-slate-800 rounded-full text-sm">${s}</span>`).join('')}
          </div>
        </div>
      `;
      document.getElementById('previewContent').innerHTML = previewContent;
      document.getElementById('previewModal').classList.remove('hidden');
    });

    document.getElementById('closePreviewBtn').addEventListener('click', () => {
      document.getElementById('previewModal').classList.add('hidden');
    });

    // Load resumes
    async function loadResumes() {
      try {
        const res = await fetch(`${API_BASE}/resumes`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const listContainer = document.getElementById('resumeList');
        if (data.resumes.length > 0) {
          listContainer.innerHTML = data.resumes.map(r => `
            <div class="p-3 bg-slate-100 rounded text-sm">
              <p class="font-medium text-slate-800">${r.name}</p>
              <p class="text-xs text-slate-600">${new Date(r.created_at).toLocaleDateString('zh-CN')}</p>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('加载简历列表失败:', error);
      }
    }

    // Copy share link
    document.getElementById('copyShareLinkBtn').addEventListener('click', () => {
      const link = document.getElementById('shareLink').value;
      if (link) {
        navigator.clipboard.writeText(link);
        alert('✓ 已复制到剪贴板！');
      }
    });

    // Initialize
    if (token && currentUser.name) {
      showDashboard();
    } else {
      showAuthSection();
    }
  </script>

</body>
</html>
