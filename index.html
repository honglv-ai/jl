<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .glitch {
            font-size: 120px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            position: relative;
            letter-spacing: 8px;
            animation: shake 3s infinite;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .glitch:hover {
            transform: scale(1.15);
            color: #ff3333;
            animation: shake-hard 0.5s infinite;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8),
                         0 0 40px rgba(255, 0, 0, 0.5),
                         0 0 80px rgba(255, 0, 0, 0.3);
        }

        .glitch.broken {
            animation: break-apart 0.6s ease-out forwards;
        }

        .glitch.rebuilding {
            animation: rebuild 0.8s ease-out forwards;
        }

        .glitch::before,
        .glitch::after {
            content: 'FAKE NEWS';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            color: #ff00ff;
            animation: glitch-1 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch:hover::before {
            color: #ff0000;
            animation: glitch-1 0.3s infinite linear alternate-reverse;
        }

        .glitch::after {
            color: #00ffff;
            animation: glitch-2 3s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        .glitch:hover::after {
            color: #ff6600;
            animation: glitch-2 0.2s infinite linear alternate-reverse;
        }

        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(-3px, 3px); }
            100% { transform: translate(0); }
        }

        @keyframes shake {
            0%, 90%, 100% { transform: translate(0); }
            92% { transform: translate(-5px, 0); }
            94% { transform: translate(5px, 0); }
            96% { transform: translate(-5px, 0); }
            98% { transform: translate(5px, 0); }
        }

        @keyframes shake-hard {
            0% { transform: scale(1.15) translate(0); }
            25% { transform: scale(1.15) translate(-8px, 4px); }
            50% { transform: scale(1.15) translate(8px, -4px); }
            75% { transform: scale(1.15) translate(-4px, -8px); }
            100% { transform: scale(1.15) translate(4px, 8px); }
        }

        @keyframes break-apart {
            0% {
                transform: scale(1.15) translate(0);
                opacity: 1;
                filter: blur(0);
            }
            50% {
                transform: scale(1.3) translate(20px, -10px);
                opacity: 0.8;
                filter: blur(2px);
            }
            100% {
                transform: scale(0.5) translate(100px, 50px) rotate(15deg);
                opacity: 0;
                filter: blur(10px);
            }
        }

        @keyframes rebuild {
            0% {
                transform: scale(0.5) translate(-100px, -50px) rotate(-15deg);
                opacity: 0;
                filter: blur(10px);
            }
            50% {
                transform: scale(1.2) translate(-10px, 5px);
                opacity: 0.7;
                filter: blur(3px);
            }
            100% {
                transform: scale(1) translate(0) rotate(0);
                opacity: 1;
                filter: blur(0);
            }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .noise {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: transparent url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.08"/></svg>');
            animation: noise 0.5s infinite;
            pointer-events: none;
            z-index: 9;
        }

        @keyframes noise {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -5%); }
            20% { transform: translate(-10%, 5%); }
            30% { transform: translate(5%, -10%); }
            40% { transform: translate(-5%, 15%); }
            50% { transform: translate(-10%, 5%); }
            60% { transform: translate(15%, 0); }
            70% { transform: translate(0, 10%); }
            80% { transform: translate(-15%, 0); }
            90% { transform: translate(10%, 5%); }
            100% { transform: translate(5%, 0); }
        }

        .counter {
            position: fixed;
            top: 30px;
            right: 40px;
            color: #ff3333;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            z-index: 20;
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.6);
        }

        .counter.pop {
            animation: pop 0.3s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); color: #fff; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="glitch" id="glitch">FAKE NEWS</div>
    <div class="counter" id="counter">CLICKS: 0</div>
    <div class="scanline"></div>
    <div class="noise"></div>

    <script>
        const glitch = document.getElementById('glitch');
        const counter = document.getElementById('counter');
        let clickCount = 0;
        let isAnimating = false;

        glitch.addEventListener('click', function() {
            if (isAnimating) return;
            isAnimating = true;

            // 计数器+1
            clickCount++;
            counter.textContent = `CLICKS: ${clickCount}`;
            counter.classList.remove('pop');
            void counter.offsetWidth; // 强制重排触发动画
            counter.classList.add('pop');

            // 炸开
            this.classList.remove('rebuilding');
            this.classList.add('broken');

            // 重组
            setTimeout(() => {
                this.classList.remove('broken');
                this.classList.add('rebuilding');
            }, 600);

            // 恢复正常
            setTimeout(() => {
                this.classList.remove('rebuilding');
                isAnimating = false;
            }, 1400);
        });
    </script>
</body>
</html>
